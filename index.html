<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মজনু স্ক্রিন প্রিন্ট ERP - ভি ১৪.০</title>
    <style>
        :root { --primary: #1e40af; --bg: #f1f5f9; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .header { background: #1e40af; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: #1e40af; color: white; padding: 15px; width: 100%; font-size: 16px; }
        .btn-sync { background: #10b981; color: white; padding: 10px 20px; margin-top: 10px; }
        #loginScreen { position: fixed; inset: 0; background: #1e40af; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>মজনু স্ক্রিন প্রিন্ট</h2>
        <p>প্রবেশ করতে পিন দিন</p>
        <input type="password" id="pinInput" placeholder="••••" maxlength="4" style="text-align:center; font-size: 24px;">
        <button onclick="checkPin()" class="btn-main">প্রবেশ করুন</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        মজনু স্ক্রিন প্রিন্ট এন্ড কম্পিউটার স্মার্ট ERP
        <button onclick="location.reload()" style="float:right; background:red; color:white; padding:5px 10px; font-size:12px;">Logout</button>
    </div>
    
    <div class="container">
        <div class="card">
            <h3>নতুন মেমো তৈরি</h3>
            <input type="text" id="custName" placeholder="কাস্টমারের নাম">
            <input type="number" id="totalBill" placeholder="মোট বিল (৳)">
            <input type="number" id="paidAmount" placeholder="জমা (৳)">
            <button onclick="saveData()" class="btn-main">সেভ করুন</button>
            <button onclick="syncData()" class="btn-sync">Sync Online (ফায়ারবেস)</button>
        </div>

        <div class="card">
            <h3>সাম্প্রতিক মেমো তালিকা</h3>
            <div id="dataList">ডাটা লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // আপনার ফায়ারবেস কনফিগ
    const firebaseConfig = {
        apiKey: "AIzaSyDkNUNq0bbEAguSW2nCvJ1IqdG7_wBj7U0",
        authDomain: "mojnu-screen-print.firebaseapp.com",
        databaseURL: "https://mojnu-screen-print-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mojnu-screen-print",
        storageBucket: "mojnu-screen-print.firebasestorage.app",
        messagingSenderId: "807078340924",
        appId: "1:807078340924:web:5c5efcbcaf19eb0a47d639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // পিন চেক লজিক
    window.checkPin = function() {
        const pin = document.getElementById("pinInput").value;
        if(pin === "1234") { // আপনার পিন
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadData();
        } else {
            alert("ভুল পিন! আবার চেষ্টা করুন।");
        }
    };

    // ডাটা সেভ করার ফাংশন
    window.saveData = function() {
        const name = document.getElementById("custName").value;
        const total = document.getElementById("totalBill").value;
        const paid = document.getElementById("paidAmount").value;

        if(!name || !total) return alert("সব তথ্য দিন");

        const newMemoRef = push(ref(db, 'memos/'));
        set(newMemoRef, {
            customer: name,
            total: total,
            paid: paid,
            date: new Date().toLocaleString()
        }).then(() => {
            alert("সফলভাবে সেভ হয়েছে!");
            document.getElementById("custName").value = "";
            document.getElementById("totalBill").value = "";
            document.getElementById("paidAmount").value = "";
        });
    };

    // ডাটা দেখানোর ফাংশন
    function loadData() {
        onValue(ref(db, 'memos/'), (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById("dataList");
            listDiv.innerHTML = "";
            for (let id in data) {
                listDiv.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px;">
                    <b>${data[id].customer}</b> - বিল: ৳${data[id].total} (জমা: ৳${data[id].paid})
                </div>`;
            }
        });
    }
</script>

</body>
</html>
